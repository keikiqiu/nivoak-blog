<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Nivoak Whiskey Guide</title>
    <link rel="canonical" href="https://nivoak.com{{ page.url }}">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; line-height: 1.8; color: #333; }
        h1 { color: #046bd2; border-bottom: 2px solid #046bd2; padding-bottom: 10px; }
        h2 { color: #046bd2; margin-top: 30px; }
        a { color: #046bd2; }
        .post-meta { color: #666; font-size: 14px; margin-bottom: 20px; }
        .content { margin: 20px 0; }
        .content p { margin: 15px 0; }
        .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #eee; font-size: 14px; color: #666; }
        .cta { background: #046bd2; color: white; padding: 15px 25px; border-radius: 8px; text-align: center; margin: 30px 0; }
        .cta a { color: white; font-weight: bold; }
        nav { margin-bottom: 20px; }
        nav a { margin-right: 15px; }
    </style>
</head>
<body>
    <nav><a href="{{ site.baseurl }}/">Home</a> <a href="https://nivoak.com">Shop Nivoak</a></nav>
    <h1>{{ page.title }}</h1>
    <div class="post-meta">{{ page.date | date: "%B %d, %Y" }}</div>
    <div class="content">
        {{ content }}
    </div>
    <div class="cta">
        <a href="https://nivoak.com/shop/">Shop Premium Whiskey Stones at Nivoak →</a>
    </div>
    <div class="footer">
        <p>© 2026 <a href="https://nivoak.com">Nivoak.com</a> — Premium Whiskey Stones & Bar Accessories</p>
    </div>
</body>
</html>
